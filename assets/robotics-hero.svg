<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Robotics and Embodied AI Hero</title>
  <desc id="desc">A dark futuristic robotics lab background with simulation grids, robot arm traces, neural circuits, and dataset particles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#040713"/>
      <stop offset=".5" stop-color="#0A1021"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="flow" x1="130" y1="185" x2="1470" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset=".42" stop-color="#7C3AED"/>
      <stop offset=".72" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 420) rotate(90) scale(420 620)">
      <stop stop-color="#38BDF8" stop-opacity=".22"/>
      <stop offset=".55" stop-color="#7C3AED" stop-opacity=".10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" stroke="#FFFFFF" stroke-opacity=".055"/>
      <path d="M13.5 0V54M27 0V54M40.5 0V54M0 13.5H54M0 27H54M0 40.5H54" stroke="#FFFFFF" stroke-opacity=".022"/>
    </pattern>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#core)"/>

